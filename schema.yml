components:
  schemas:
    ActionEnum:
      enum:
      - approve
      - reject
      type: string
      description: |-
        * `approve` - approve
        * `reject` - reject
    AudioAnalysisRequest:
      type: object
      properties:
        audio:
          type: string
          format: uri
        phone_number:
          type: string
        session_id:
          type: string
          format: uuid
      required:
      - audio
      - phone_number
    AudioAnalysisResponse:
      type: object
      properties:
        risk_score:
          type: integer
        is_scam:
          type: boolean
        transcript:
          type: string
        warning_message:
          type: string
      required:
      - is_scam
      - risk_score
      - transcript
      - warning_message
    ChatAIRequest:
      type: object
      properties:
        user_message:
          type: string
        session_id:
          type: string
          format: uuid
        context:
          type: string
          default: general
        images:
          type: array
          items:
            type: string
          default: []
      required:
      - session_id
      - user_message
    ChatFolder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    ChatSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        folder:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - updated_at
    ChatbotConfig:
      type: object
      properties:
        tone:
          $ref: '#/components/schemas/ToneEnum'
        tone_display:
          type: string
          readOnly: true
        language_style:
          $ref: '#/components/schemas/LanguageStyleEnum'
        language_style_display:
          type: string
          readOnly: true
        custom_name:
          type: string
          description: Custom name for the AI assistant
          maxLength: 50
        custom_instructions:
          type: string
          description: Additional instructions for the AI
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - language_style_display
      - tone_display
      - updated_at
    CrashReportRequest:
      type: object
      properties:
        device_info:
          type: string
        stack_trace:
          type: string
        timestamp:
          type: integer
        version:
          type: string
          default: ''
        os_version:
          type: string
          default: ''
        severity:
          type: string
          default: ERROR
      required:
      - device_info
      - stack_trace
      - timestamp
    CrashReportResponse:
      type: object
      properties:
        status:
          type: string
        report_id:
          type: string
          format: uuid
      required:
      - report_id
      - status
    ImageAnalysisRequest:
      type: object
      properties:
        images:
          type: array
          items:
            type: string
            format: uri
        session_id:
          type: string
          format: uuid
      required:
      - images
    ImageAnalysisResponse:
      type: object
      properties:
        ocr_text:
          type: string
        risk_analysis:
          $ref: '#/components/schemas/ImageRiskAnalysis'
      required:
      - ocr_text
      - risk_analysis
    ImageRiskAnalysis:
      type: object
      properties:
        is_safe:
          type: boolean
        risk_level:
          type: string
        details:
          type: string
      required:
      - details
      - is_safe
      - risk_level
    LanguageStyleEnum:
      enum:
      - simple
      - detailed
      - concise
      type: string
      description: |-
        * `simple` - Đơn giản, dễ hiểu
        * `detailed` - Chi tiết, chuyên sâu
        * `concise` - Ngắn gọn, súc tích
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    PaginatedReportListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/ReportList'
    PaginatedScanEventListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
