          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                message:
                  type: string
                notification_type:
                  type: string
                url:
                  type: string
              required:
              - title
              - message
      security:
      - tokenAuth: []
      - CsrfExemptSessionAuthentication: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
