{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Đổi mật khẩu thành công" %}{% endblock %}

{% block content %}
<div class="animate-fadein max-w-md mx-auto py-12 px-4 space-y-8 text-center">
  <div class="liquid-card p-8 sm:p-10 space-y-6">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2.5rem] bg-green-500/10 text-green-400 border border-green-500/20 shadow-lg shadow-green-500/10">
      <i class="bi bi-check-circle-fill text-4xl"></i>
    </div>
    <h1 class="text-2xl font-black text-white tracking-tight">{% trans "Mật khẩu đã được cập nhật" %}</h1>
    <p class="text-white/40 text-sm font-medium leading-relaxed">{% trans "Bạn có thể đăng nhập lại bằng mật khẩu mới." %}</p>
    <a href="{% url 'login' %}" class="liquid-btn w-full py-4 bg-cyan-500 text-black font-black uppercase tracking-[0.2em] text-sm hover:bg-cyan-400 transition-all">{% trans "Đăng nhập ngay" %}</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof showToast === 'function') {
    showToast('Đặt lại mật khẩu thành công!', 'success');
  }
  setTimeout(function () {
    window.location.href = '{% url "login" %}';
  }, 1800);
});
</script>
{% endblock %}
