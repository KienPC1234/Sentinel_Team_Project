<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt lại mật khẩu</title>
</head>
<body style="margin:0;padding:0;background:#020617;color:#e2e8f0;font-family:Inter,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;background:#020617;">
    <tr><td align="center">
      <table role="presentation" width="620" cellspacing="0" cellpadding="0" style="max-width:620px;width:100%;background:#0f172a;border:1px solid rgba(255,255,255,0.08);border-radius:24px;overflow:hidden;">
        <tr>
          <td style="padding:28px;background:linear-gradient(135deg,#0f172a,#111827);border-bottom:1px solid rgba(255,255,255,0.08);">
            <div style="font-size:22px;font-weight:900;letter-spacing:1px;color:#22d3ee;text-transform:uppercase;">ShieldCall VN</div>
            <div style="margin-top:8px;font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;">Khôi phục mật khẩu</div>
          </td>
        </tr>
        <tr>
          <td style="padding:28px;">
            <p style="margin:0 0 12px;font-size:15px;color:#cbd5e1;">Chào bạn,</p>
            <p style="margin:0 0 18px;font-size:14px;line-height:1.65;color:#94a3b8;">Bạn đã yêu cầu đặt lại mật khẩu cho tài khoản ShieldCall VN. Nhấn nút bên dưới để tiếp tục.</p>
            <div style="margin:0 0 20px;">
              <a href="{{ password_reset_url }}" style="display:inline-block;background:#22d3ee;color:#020617;text-decoration:none;padding:12px 18px;border-radius:12px;font-size:12px;font-weight:900;letter-spacing:0.8px;text-transform:uppercase;">Đặt lại mật khẩu</a>
            </div>
            <p style="margin:0 0 8px;font-size:13px;color:#94a3b8;">Nếu nút không hoạt động, sao chép liên kết này:</p>
            <p style="margin:0 0 14px;font-size:12px;word-break:break-all;color:#67e8f9;">{{ password_reset_url }}</p>
            <p style="margin:0;font-size:12px;line-height:1.6;color:#64748b;">Nếu bạn không yêu cầu thao tác này, hãy bỏ qua email này.</p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
