{% extends "base.html" %}
{% block title %}400 - Yêu cầu không hợp lệ - ShieldCall VN{% endblock %}

{% block content %}
<div class="animate-fadein flex flex-col items-center justify-center min-h-[60vh] text-center space-y-8">
    <div class="relative">
        <div class="text-[12rem] font-black text-white/5 leading-none select-none">400</div>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-24 h-24 rounded-[2.5rem] bg-amber-500/10 text-amber-400 border border-amber-500/20 shadow-2xl flex items-center justify-center">
                <i class="bi bi-exclamation-triangle-fill text-5xl"></i>
            </div>
        </div>
    </div>

    <div class="space-y-2">
        <h1 class="text-3xl font-black text-white tracking-tight">Yêu cầu chưa hợp lệ</h1>
        <p class="text-white/40 text-sm font-medium">Vui lòng kiểm tra lại thông tin và thử lại trong giây lát.</p>
    </div>

    <div class="flex gap-4">
        <button onclick="history.back()" class="liquid-btn py-3 px-8 text-xs font-black bg-white/5 text-white/80 border-white/10 hover:bg-white/10 uppercase tracking-widest">Quay lại</button>
        <a href="/" class="liquid-btn py-3 px-10 text-xs font-black bg-amber-500 text-black shadow-lg shadow-amber-500/20 hover:bg-amber-400 uppercase tracking-widest transition-all">Trang chủ</a>
    </div>
</div>
{% endblock %}
